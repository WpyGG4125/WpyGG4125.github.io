<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket Race</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: #f8f9fa; overflow-x: hidden; }
        #canvas-container {
            background: #05070a; 
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            position: relative;
        }
        canvas { max-width: 100%; height: auto; }
        .leaderboard { max-height: 400px; overflow-y: auto; }
        #qrContainer img { max-width: 180px; height: auto; border: 4px solid #fe9100; border-radius: 10px; margin-bottom: 15px; padding: 0.5rem;}
        .btn-orange { background-color: #fe9100; color: white; border: none; }
        .btn-orange:hover { background-color: #e68200; color: white; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row text-center mb-4">
        <div class="col">
            <h1 class="display-4 fw-bold" style="color: #fe9100 !important;">Satellite Race: Deep Space 🛰️</h1>
            <p class="lead">Monitoring the gauntlet. Names sync automatically from the Launch Pad.</p>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card shadow-sm p-4">
                <div id="qrContainer" class="text-center d-none">
                    <div id="qrcode" class="d-flex justify-content-center"></div>
                    <p class="text-muted small">Scan to Join the Race!</p>
                </div>

                <div class="mb-3">
                    <label for="playerNames" class="form-label fw-bold">Active Pilots</label>
                    <textarea class="form-control" id="playerNames" rows="4" placeholder="Waiting for check-ins..."></textarea>
                </div>
                <button id="startBtn" class="btn btn-orange btn-lg w-100 mb-3">Release the Marbles!</button>
                <button id="resetBtn" class="btn btn-outline-secondary w-100 mb-2">Reset Mission</button>
                <button id="clearBtn" class="btn btn-outline-danger btn-sm w-100 mb-2">Clear list</button>
                <button id="qrToggleBtn" class="btn btn-info btn-sm w-100 text-white">Show QR Code</button>
                
                <hr>
                <h5 class="mt-3">Mission Log (Winners)</h5>
                <ol id="leaderboard" class="list-group list-group-numbered leaderboard"></ol>
            </div>
        </div>
        <div class="col-md-8">
            <div id="canvas-container"></div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBdPDS5r4aoKcqBzJdI-cbCTCPY4VBfs0g",
        authDomain: "github-page-b27e5.firebaseapp.com",
        databaseURL: "https://github-page-b27e5-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "github-page-b27e5",
        storageBucket: "github-page-b27e5.firebasestorage.app",
        messagingSenderId: "996810085917",
        appId: "1:996810085917:web:7bc9f4ec804863f708d8f4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const racingRef = ref(db, 'marble_racing');

    onValue(racingRef, (snapshot) => {
        const data = snapshot.val();
        if (data) {
            const nameArray = Object.values(data).map(entry => entry.name);
            document.getElementById('playerNames').value = nameArray.join(', ');
        }
    });

    document.getElementById('qrToggleBtn').addEventListener('click', function() {
        const box = document.getElementById('qrContainer');
        box.classList.toggle('d-none');
        this.innerText = box.classList.contains('d-none') ? "Show QR Code" : "Hide QR Code";
    });

    // MATTER.JS ENGINE SETUP
    const { Engine, Render, Runner, Bodies, Composite, Events, Body } = Matter;
    const engine = Engine.create();
    engine.positionIterations = 10;
    engine.velocityIterations = 10;
    const world = engine.world;
    const width = 600, worldHeight = 4000, viewHeight = 800;
    const obstacleColor = '#ADD8E6';

    const render = Render.create({
        element: document.getElementById('canvas-container'),
        engine: engine,
        options: { width, height: viewHeight, wireframes: false, background: '#05070a', hasBounds: true }
    });

    Render.run(render);
    Runner.run(Runner.create(), engine);

    let sats = [], winners = [], particles = [], wheels = [], raceInProgress = false, 
        cameraY = 0, cameraLocked = false, flippers = [], slidingDoors = [];

    function createWheel(x, y) {
        const options = { isStatic: true, render: { fillStyle: obstacleColor } };
        const b1 = Bodies.rectangle(x, y, 180, 10, options);
        const b2 = Bodies.rectangle(x, y, 180, 10, { ...options, angle: Math.PI / 3 });
        const b3 = Bodies.rectangle(x, y, 180, 10, { ...options, angle: (Math.PI / 3) * 2 });
        Composite.add(world, [b1, b2, b3]);
        wheels.push({ bodies: [b1, b2, b3], speed: (Math.random() * 0.02 + 0.01) * (Math.random() > 0.5 ? 1 : -1) });
    }

    function buildTrack() {
        Composite.clear(world);
        sats = []; winners = []; particles = []; wheels = []; cameraY = 0; cameraLocked = false;
        render.bounds.min.y = 0; render.bounds.max.y = viewHeight;
        document.getElementById('startBtn').innerText = "Release the Marbles!";
        document.getElementById('leaderboard').innerHTML = '';

        const wallOptions = { isStatic: true, render: { fillStyle: '#1a1d23' } };
        const dotOptions = { isStatic: true, render: { fillStyle: obstacleColor } };
        
        Composite.add(world, [
            Bodies.rectangle(width/2, -10, width, 40, wallOptions),
            Bodies.rectangle(-20, worldHeight/2, 40, worldHeight, wallOptions),
            Bodies.rectangle(width+20, worldHeight/2, 40, worldHeight, wallOptions),
            Bodies.rectangle(width/2, worldHeight - 30, width, 60, { isStatic: true, isSensor: true, label: 'finishLine', render: { fillStyle: '#2ecc71', opacity: 0.2 } })
        ]);

        // top pins
        for (let r = 0; r < 10; r++) for (let c = 0; c < 11; c++) {
            const x = (c * 50) + (r % 2 === 0 ? 25 : 50);
            if (x < width - 25) Composite.add(world, Bodies.circle(x + 13, 150 + (r * 60), 5, dotOptions));
        }

        // wheels and ramps
        for (let y = 850; y < 1510; y += 220) {
            createWheel(width / 2 + (Math.random() * 100 - 50), y);
            Composite.add(world, [
                Bodies.rectangle(110, y + 110, 250, 15, { isStatic: true, angle: 0.2, render: { fillStyle: obstacleColor } }),
                Bodies.rectangle(490, y + 110, 250, 15, { isStatic: true, angle: -0.2, render: { fillStyle: obstacleColor } })
            ]);
        }

        for (let y = 1700; y < 3050; y += 450) {
            // 1. Sliding "Air-Lock" Doors
            const door = Bodies.rectangle(width / 2, y, 200, 20, { isStatic: true, render: { fillStyle: '#ff4757' } });
            slidingDoors.push({ body: door, startX: width / 2, range: 150, speed: 0.002 });
            Composite.add(world, door);

            // 2. Pinball Flippers (Left and Right)
            const flipL = Bodies.rectangle(120, y + 150, 180, 20, { isStatic: true, chamfer: { radius: 10 }, render: { fillStyle: '#fe9100' } });
            const flipR = Bodies.rectangle(width - 120, y + 150, 180, 20, { isStatic: true, chamfer: { radius: 10 }, render: { fillStyle: '#fe9100' } });
            flippers.push({ body: flipL, angle: 0.5, side: 1 }, { body: flipR, angle: -0.5, side: -1 });
            Composite.add(world, [flipL, flipR]);

            // 3. Rotating Spinner
            createWheel(width / 2, y + 250);

            // 4. Bouncy Bumpers
            for(let i=0; i<3; i++) {
                Composite.add(world, Bodies.circle(150 + (i*150), y + 400, 20, { isStatic: true, restitution: 1.5, render: { fillStyle: '#00d2d3' } }));
            }
        }

        // bottom pins
        for (let r = 0; r < 10; r++) for (let c = 0; c < 11; c++) {
            const x = (c * 50) + (r % 2 === 0 ? 25 : 50);
            if (x < width - 25) Composite.add(world, Bodies.circle(x + 13, 3130 + (r * 60), 5, dotOptions));
        }
    }

    Events.on(engine, 'beforeUpdate', () => {
        const time = Date.now();
        wheels.forEach(w => w.bodies.forEach(b => Body.setAngle(b, b.angle + w.speed)));
        slidingDoors.forEach(d => {
            const moveX = d.startX + Math.sin(time * d.speed) * d.range;
            Body.setPosition(d.body, { x: moveX, y: d.body.position.y });
        });
        flippers.forEach(f => {
            const osc = Math.sin(time * 0.01) * 0.8; 
            Body.setAngle(f.body, f.angle + (osc * f.side));
        });
        if (raceInProgress && !cameraLocked) {
            let lowY = 0; sats.forEach(r => { if (r.position.y > lowY) lowY = r.position.y; });
            if (lowY > viewHeight / 2) {
                cameraY = lowY - viewHeight / 2;
                if (cameraY > worldHeight - viewHeight) { cameraY = worldHeight - viewHeight; cameraLocked = true; }
                render.bounds.min.y = cameraY; render.bounds.max.y = cameraY + viewHeight;
            }
        }
    });

    Events.on(engine, 'collisionStart', (e) => {
        e.pairs.forEach(p => {
            const r = p.bodyA.label === 'finishLine' ? p.bodyB : (p.bodyB.label === 'finishLine' ? p.bodyA : null);
            if (r && r.circleRadius && !winners.includes(r.label)) {
                winners.push(r.label); r.isFlying = true; r.collisionFilter.mask = 0;
                if (winners.length === 1) document.getElementById('startBtn').innerText = "Launched!";
                updateLeaderboard();
            }
        });
    });

    Events.on(render, 'afterRender', () => {
        const ctx = render.context;
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i]; p.opacity -= 0.02; p.y += 2;
            if (p.opacity <= 0) particles.splice(i, 1);
            else { ctx.beginPath(); ctx.arc(p.x, p.y - cameraY, p.size, 0, Math.PI * 2); ctx.fillStyle = `rgba(0, ${80 + 175 * p.opacity}, 255, ${p.opacity})`; ctx.fill(); }
        }
        ctx.globalAlpha = 1; ctx.fillStyle = "white";
        sats.forEach(r => {
            const { x, y } = r.position; const drawY = y - cameraY;
            if (r.isFlying) { Body.setAngle(r, 0); Body.setVelocity(r, { x: 0, y: -18 }); particles.push({ x, y, size: Math.random() * 12 + 6, opacity: 1 }); }
            ctx.save(); ctx.translate(x, drawY);
            ctx.rotate(r.isFlying ? -0.8 : r.angle + Math.PI);
            ctx.font = "32px serif"; ctx.textAlign = "center"; 
            ctx.textBaseline = "middle"; 
            ctx.fillText(r.isFlying ? "🚀" : "🛰️", 0, 0);
            ctx.restore();
            ctx.font = "bold 13px Arial"; ctx.fillText(r.label, x, drawY - 35);
        });
    });

    function updateLeaderboard() {
        document.getElementById('leaderboard').innerHTML = winners.map((n, i) => `<li class="list-group-item d-flex justify-content-between align-items-center ${i===0?'list-group-item-success':''}">${n} ${i===0?'🏅':''}</li>`).join('');
    }

    document.getElementById('startBtn').addEventListener('click', () => {
        const names = document.getElementById('playerNames').value.split(',').map(n => n.trim()).filter(n => n !== "");
        if (names.length === 0 || raceInProgress) return;
        raceInProgress = true; document.getElementById('startBtn').innerText = "Launching...";
        names.forEach(n => {
            const r = Bodies.circle(width/2 + (Math.random()*100-50), 50, 15, { restitution: 0.4, label: n, isFlying: false, render: { opacity: 0 } });
            sats.push(r); Composite.add(world, r);
        });
    });

    document.getElementById('resetBtn').addEventListener('click', () => { 
        raceInProgress = false; 
        buildTrack(); 
    });
    document.getElementById('clearBtn').addEventListener('click', () => { 
        remove(racingRef);
        document.getElementById('playerNames').value = '';
    });

    const qrcode = new QRCode(document.getElementById("qrcode"), {
        text: window.location.href,
        width: 200,
        height: 200,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
    });

    // Function to update the QR code based on the toggle state
    window.updateQR = function() {
        const finalUrl = window.location.href.split('.html')[0] + '_register.html';
        qrcode.makeCode(finalUrl);
    };

    window.updateQR();
    buildTrack();
</script>
</body>
</html>
