<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizLive - Kahoot Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --kahoot-red: #ff3355; --kahoot-blue: #45a3e5;
            --kahoot-yellow: #ffca28; --kahoot-green: #66bb6a;
            --kahoot-purple: #46178f;
            --glass: rgba(255, 255, 255, 0.1);
        }
        body { 
            background: radial-gradient(circle at top right, #6d28d9, #2e1065); 
            color: white; min-height: 100vh; font-family: 'Outfit', 'Segoe UI', sans-serif; 
        }
        /* :root {
            --kahoot-red: #e21b3c; --kahoot-blue: #1368ce;
            --kahoot-yellow: #d89e00; --kahoot-green: #26890c;
            --kahoot-purple: #46178f;
        }
        body { background-color: var(--kahoot-purple); color: white; min-height: 100vh; font-family: 'Segoe UI', sans-serif; } */
        
        /* Glassmorphism UI */
        .game-screen { transition: all 0.3s ease; }
        .card, .leaderboard-item { 
            background: var(--glass); backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; 
            flex-direction: row;
            justify-content: space-evenly;
        }

        /* Answer Buttons */
        .btn-answer { 
            height: 140px; border-radius: 15px; border: none; font-size: 2rem;
            box-shadow: 0 6px 0 rgba(0,0,0,0.2); transition: 0.1s;
        }
        .btn-answer:active { transform: translateY(4px); box-shadow: none; }
        /* .btn-answer { height: 120px; font-size: 1.5rem; font-weight: bold; border: none; color: white; border-radius: 8px; transition: transform 0.1s; } */
        /* .btn-answer:active { transform: scale(0.95); } */
        .bg-red { background-color: var(--kahoot-red); }
        .bg-blue { background-color: var(--kahoot-blue); }
        .bg-yellow { background-color: var(--kahoot-yellow); }
        .bg-green { background-color: var(--kahoot-green); }

        /* Screens */
        .game-screen { display: none; padding: 20px; }
        .active-screen { display: block; }
        
        #qr-code canvas, #qr-code img { margin: 0 auto; border: 10px solid white; border-radius: 10px; }
        .player-badge { background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px; margin: 5px; display: inline-block; }

        /* Timer styling */
        .progress { height: 20px; background-color: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; }
        .progress-bar { background-color: #fff; transition: width 1s linear; }

        /* Leaderboard styling */
        .leaderboard-item { display: flex; justify-content: space-between; background: rgba(0,0,0,0.3); padding: 10px; margin-bottom: 5px; border-radius: 5px; }

        /* Spinner Overlay */
        #loadingOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(70, 23, 143, 0.9); /* Kahoot Purple */
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .spinner-border { width: 4rem; height: 4rem; }

        /* Full-screen Result Overlays */
        .result-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2000; flex-direction: column; justify-content: center; align-items: center;
        }
        .bg-correct { background-color: var(--kahoot-green); }
        .bg-wrong { background-color: var(--kahoot-red); }

        /* Rank footer for player */
        #playerRankDisplay {
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(0,0,0,0.5); padding: 15px; font-size: 1.2rem;
            z-index: 1001;
        }
        /* Big Center Rank for Scoreboard Phase */
        #centerRankDisplay {
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        #centerRankDisplay.active-screen { display: flex; }

        /* Orbiting Satellite */
        .rank-container { position: relative; width: fit-content; margin: 0 auto; }
        .rank-circle {
            background: white; color: var(--kahoot-purple);
            width: 140px; height: 140px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; font-weight: 800; margin: 30px auto;
            box-shadow: 0 0 30px rgba(255,255,255,0.3);
            position: relative; z-index: 2;
        }
        .satellite {
            position: absolute; font-size: 2rem;
            top: 50%; left: 50%; margin-top: -1.5rem; margin-left: -1rem;
            animation: orbit 4s linear infinite; z-index: 3;
        }
        @keyframes orbit {
            from { transform: rotate(0deg) translateX(100px) rotate(0deg); }
            to   { transform: rotate(360deg) translateX(100px) rotate(-360deg); }
        }

        /* Timer Styling */
        .timer-wrapper { display: flex; align-items: center; gap: 15px; margin-bottom: 2rem; }
        .timer-circle {
            width: 60px; height: 60px; border-radius: 50%;
            border: 4px solid #fff; display: flex; align-items: center;
            justify-content: center; font-weight: bold; font-size: 1.2rem;
            background: var(--kahoot-red); flex-shrink: 0;
        }
        .progress { flex-grow: 1; height: 15px !important; background: var(--glass); border-radius: 20px; }

        /* Host Top-Right Controls */
        .host-controls {
            position: fixed; top: 20px; right: 20px;
            display: flex; gap: 10px; z-index: 1050;
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner-border text-light mb-3" role="status"></div>
    <h3>Answer Saved! Waiting for results...</h3>
</div>

<div id="resultOverlay" class="result-overlay">
    <h1 id="resultStatus" class="display-1 fw-bold">CORRECT</h1>
    <h2 id="resultPoints" class="display-4">+0 pts</h2>
</div>

<div id="playerRankDisplay" class="d-none">
    You are currently in <span id="rankNumber" class="fw-bold">--</span> place
</div>

<div class="container text-center py-4">
    <div id="lobbyScreen" class="game-screen active-screen">
        <h1 class="display-3 fw-bold mb-4">Join the Game!</h1>
        <div id="qr-code" class="mb-4"></div>
        <div class="card bg-dark text-white p-3 mb-4">
            <h3>Players Joined:</h3>
            <div id="playerList" class="d-flex flex-wrap justify-content-center"></div>
        </div>
        <button id="startBtn" class="btn btn-light btn-lg d-none" onclick="startGame()">Start Quiz</button>
    </div>

    <div id="hostQuestionScreen" class="game-screen">
        <div class="host-controls">
            <button class="btn btn-sm btn-outline-warning" onclick="skipQuestion()">Skip ⏭️</button>
            <button class="btn btn-sm btn-outline-danger" onclick="quitToLobby()">Quit ❌</button>
        </div>
        <div class="timer-wrapper">
            <div id="hostTimerCircle" class="timer-circle">20</div>
            <div class="progress">
                <div id="hostTimerBar" class="progress-bar bg-warning" style="width: 100%"></div>
            </div>
        </div>
        <img id="questionImage" src="" class="img-fluid rounded mb-3" style="max-height: 250px; display: block; margin: 0 auto;">
        <h1 id="displayQuestionText" class="display-4 fw-bold mb-5"></h1>
        <div class="row g-4">
            <div class="col-6"><div class="p-4 bg-red rounded-3 h3" id="opt0"></div></div>
            <div class="col-6"><div class="p-4 bg-blue rounded-3 h3" id="opt1"></div></div>
            <div class="col-6"><div class="p-4 bg-yellow rounded-3 h3" id="opt2"></div></div>
            <div class="col-6"><div class="p-4 bg-green rounded-3 h3" id="opt3"></div></div>
        </div>

        <div id="postQuestionControls" class="mt-4 d-none">
            <button id="flowBtn" class="btn btn-primary btn-lg" onclick="handleGameFlow()">Proceed →</button>
        </div>
    </div>

    <div id="hostScoreboard" class="game-screen">
        <h1 class="display-3 fw-bold mb-4">Leaderboard</h1>
        <div id="leaderboardList" class="mx-auto" style="max-width: 600px;"></div>
        <button class="btn btn-light btn-lg mt-4" onclick="handleGameFlow()">Next Question →</button>
    </div>

    <div id="finalPodiumScreen" class="game-screen">
        <h1 class="display-1 fw-bold mb-4">🏆 Final Winners 🏆</h1>
        <div id="finalWinnersList" class="display-4"></div>
        <button class="btn btn-danger btn-lg mt-5" onclick="quitToLobby()">Finish Game</button>
    </div>

    <div id="joinScreen" class="game-screen">
        <h2 class="mb-4">Enter Nickname</h2>
        <input type="text" id="nicknameInput" class="form-control form-control-lg mb-3" placeholder="CoolNickname123">
        <button class="btn btn-success btn-lg w-100" onclick="joinGame()">Join Now!</button>
    </div>

    <div id="questionScreen" class="game-screen">
        <div id="centerRankDisplay" class="text-center">
            <h2 class="mb-4">You are in</h2>
            <div class="rank-container">
                <div class="rank-circle" id="centerRankNumber">--</div>
                <div class="satellite">🛰️</div>
            </div>
            <h3 id="centerRankText" class="mt-4 fw-bold">Keep it up!</h3>
        </div>

        <div id="playerQuestionUI">
            <h2 id="questionText" class="mb-4">Waiting...</h2>
            <div id="answerButtonsRow" class="row g-3 d-none">
                <div class="col-6"><button class="btn-answer bg-red w-100" onclick="submitAnswer(0)">▲</button></div>
                <div class="col-6"><button class="btn-answer bg-blue w-100" onclick="submitAnswer(1)">◆</button></div>
                <div class="col-6"><button class="btn-answer bg-yellow w-100" onclick="submitAnswer(2)">●</button></div>
                <div class="col-6"><button class="btn-answer bg-green w-100" onclick="submitAnswer(3)">■</button></div>
            </div>
            <div id="answerFeedback" class="mt-4 h4"></div>
            <div id="playerTimerContainer" class="progress mb-4 d-none">
                <div id="timerBar" class="progress-bar" style="width: 100%"></div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, increment, set, onValue, push, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // --- CONFIGURATION ---
    const firebaseConfig = {
        // Use your existing config here
        apiKey: "AIzaSyBdPDS5r4aoKcqBzJdI-cbCTCPY4VBfs0g",
        authDomain: "github-page-b27e5.firebaseapp.com",
        databaseURL: "https://github-page-b27e5-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "github-page-b27e5",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gameRef = ref(db, 'quizGame');
    const playersRef = ref(db, 'quizGame/players');

    let myPlayerKey = null;
    let isAdmin = false;


    const questions = [
        { q: "What is the capital of France?", options: ["London", "Berlin", "Paris", "Madrid"], correct: 2, img: "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=400" },
        { q: "Which planet is known as the Red Planet?", options: ["Earth", "Mars", "Jupiter", "Venus"], correct: 1, img: "https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?w=400" },
        { q: "What is 5 + 7?", options: ["10", "11", "12", "13"], correct: 2, img: "https://images.unsplash.com/photo-1518133910546-b6c2fb7d79e3?w=400" }
    ];

    let currentQuestionIndex = 0;
    let timerInterval = null;
    let canAnswer = false;
    // --- INITIALIZATION ---
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        
        // If URL has ?role=admin
        if (urlParams.get('role') === 'admin') {
            isAdmin = true;
            generateQR();
            document.getElementById('startBtn').classList.remove('d-none');
            listenToPlayers();
        } else {
            // Standard user join
            showScreen('joinScreen');
        }
    };

    function showScreen(id) {
        document.querySelectorAll('.game-screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
    }

    // --- HOST LOGIC ---
    function generateQR() {
        new QRCode(document.getElementById("qr-code"), {
            text: window.location.href.split('?')[0], // Link to this page without admin params
            width: 256,
            height: 256
        });
    }


    window.handleGameFlow = async function() {
        const gameSnap = await get(gameRef);
        const data = gameSnap.val();

        if (data.state === 'playing') {
            update(gameRef, { state: 'scoreboard', isAcceptingAnswers: false });
        } else if (data.state === 'scoreboard') {
            const nextIdx = (data.currentQuestion || 0) + 1;
            if (nextIdx < questions.length) {
                update(gameRef, { 
                    state: 'playing',
                    currentQuestion: nextIdx, 
                    startTime: serverTimestamp(), // Reset timer for next question
                    duration: 20,
                    isAcceptingAnswers: true 
                });
            } else {
                update(gameRef, { state: 'final' });
            }
        }
    };


    // Logic to render the leaderboard sorted by score
    function updateLeaderboardUI() {
        onValue(playersRef, (snapshot) => {
            const players = snapshot.val();
            if (!players) return;
            
            const sorted = Object.values(players).sort((a, b) => b.score - a.score);
            const listHtml = sorted.map((p, i) => `
                <div class="leaderboard-item">
                    <span>${i+1}. ${p.name}</span>
                    <span class="fw-bold">${p.score} pts</span>
                </div>
            `).join('');
            
            document.getElementById('leaderboardList').innerHTML = listHtml;
        }, { onlyOnce: true });
    }

    function listenToPlayers() {
        onValue(playersRef, (snapshot) => {
            const list = document.getElementById('playerList');
            list.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                Object.values(data).forEach(p => {
                    list.innerHTML += `<span class="player-badge">${p.name}</span>`;
                });
            }
        });
    }

    // Helper to get time
    let serverOffset = 0;
    const offsetRef = ref(db, ".info/serverTimeOffset");
    onValue(offsetRef, (snap) => { serverOffset = snap.val() || 0; });

    window.startGame = function() {
        update(gameRef, { 
            state: 'playing', 
            currentQuestion: 0, 
            startTime: serverTimestamp(), // Sync start time
            duration: 20, 
            isAcceptingAnswers: true 
        });
    };



    window.skipQuestion = function() {
        // 1. Kill the local timer interval immediately
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        // 2. Set timer to 0 and close answers in one transaction
        update(gameRef, { 
            isAcceptingAnswers: false, 
            startTime: 0
        });
    };

    function runTimerUI(startTime, duration, barId) {
        if (timerInterval) clearInterval(timerInterval);
        
        const bar = document.getElementById(barId);
        const circle = document.getElementById(isAdmin ? 'hostTimerCircle' : 'playerTimerCircle'); // Ensure you add this ID to player UI if needed

        timerInterval = setInterval(() => {
            const now = Date.now() + serverOffset;
            const elapsed = Math.floor((now - startTime) / 1000);
            const remaining = Math.max(0, duration - elapsed);
            const percentage = (remaining / duration) * 100;
            
            bar.style.width = percentage + "%";
            if(circle) circle.innerText = remaining;

            if (remaining <= 0) {
                clearInterval(timerInterval);
                if (isAdmin) update(gameRef, { isAcceptingAnswers: false });
            }
        }, 100);
    }

    window.quitToLobby = function() {
        if (confirm("Quit game and return to Lobby? Progress will be lost.")) {
            // Reset game state and clear answers/players if desired
            set(gameRef, { 
                state: 'lobby', 
                currentQuestion: 0, 
                isAcceptingAnswers: false 
            });
            // Optional: clear players
            set(playersRef, {}); 
            location.reload(); // Refresh host to regenerate QR
        }
    };

    // --- PLAYER LOGIC ---
    window.joinGame = function() {
        const name = document.getElementById('nicknameInput').value;
        if (!name) return alert("Enter a name!");
        
        const newPlayer = push(playersRef);
        myPlayerKey = newPlayer.key;
        set(newPlayer, { name: name, score: 0 });
        
        showScreen('questionScreen');
        document.getElementById('questionText').innerText = "Waiting for Host to start...";
    };

window.submitAnswer = async function(choiceIndex) {
    if (!canAnswer) return;
    canAnswer = false; 

    // --- RE-ACTIVATING LOADING SCREEN ---
    const loadingOverlay = document.getElementById('loadingOverlay');
    if (loadingOverlay) loadingOverlay.style.display = 'flex';
    
    document.getElementById('playerQuestionUI').style.opacity = "0.5";
    document.getElementById('playerQuestionUI').style.pointerEvents = "none";

    try {
        const gameSnap = await get(gameRef);
        const gameData = gameSnap.val();
        
        if (!gameData.isAcceptingAnswers) return;

        const correctIndex = questions[currentQuestionIndex].correct;
        const playerRef = ref(db, `quizGame/players/${myPlayerKey}`);

        if (choiceIndex === correctIndex) {
            const now = Date.now() + serverOffset;
            const elapsed = (now - gameData.startTime) / 1000;
            const remaining = Math.max(0, (gameData.duration || 20) - elapsed);
            // Fast Finger Bonus: Base 500 + time-based bonus
            const pointsEarned = Math.floor(500 + (remaining * 25));
            
            await update(playerRef, { score: increment(pointsEarned) });
            document.getElementById('answerFeedback').innerHTML = `<span class='text-success'>Correct! +${pointsEarned}</span>`;
        } else {
            document.getElementById('answerFeedback').innerHTML = `<span class='text-danger'>Wrong!</span>`;
        }
        await set(ref(db, `quizGame/answers/q${currentQuestionIndex}/${myPlayerKey}`), choiceIndex);
    } catch (e) { 
        console.error(e);
        if (loadingOverlay) loadingOverlay.style.display = 'none'; // Hide on error so they can try again if possible
    }
};

    // --- SYNC STATE ---
    let lastLoadedQuestion = -1;

    onValue(gameRef, (snapshot) => {
    const data = snapshot.val();
    if (!data) return;

    // 1. GLOBAL UPDATES
    currentQuestionIndex = data.currentQuestion || 0;
    const currentQ = questions[currentQuestionIndex];
    const loadingOverlay = document.getElementById('loadingOverlay');

    // --- ADMIN / HOST VIEW ---
    if (isAdmin) {
        if (data.state === 'playing') {
            showScreen('hostQuestionScreen');
            document.getElementById('displayQuestionText').innerText = currentQ.q;
            document.getElementById('questionImage').src = currentQ.img || "";
            for(let i=0; i<4; i++) document.getElementById(`opt${i}`).innerText = currentQ.options[i];
            
            if (data.startTime) runTimerUI(data.startTime, data.duration || 20, 'hostTimerBar');
            
            const controls = document.getElementById('postQuestionControls');
            !data.isAcceptingAnswers ? controls.classList.remove('d-none') : controls.classList.add('d-none');
        } else if (data.state === 'scoreboard') {
            showScreen('hostScoreboard');
            updateLeaderboardUI();
        } else if (data.state === 'final') {
            showScreen('finalPodiumScreen');
            renderFinalPodium();
        }
    }

    // --- PLAYER VIEW ---
    if (!isAdmin && myPlayerKey) {
        const btns = document.getElementById('answerButtonsRow');
        const timer = document.getElementById('playerTimerContainer');
        const qUI = document.getElementById('playerQuestionUI');
        const centerRank = document.getElementById('centerRankDisplay');
        const resOverlay = document.getElementById('resultOverlay');
        const rankFooter = document.getElementById('playerRankDisplay');

        // Reset visibility
        btns.classList.add('d-none');
        timer.classList.add('d-none');
        centerRank.classList.remove('active-screen');
        qUI.classList.remove('d-none');
        rankFooter.classList.add('d-none');

        if (data.state === 'playing') {
            showScreen('questionScreen');
            if (data.isAcceptingAnswers) {
                // if (loadingOverlay) loadingOverlay.style.display = 'none';
                
                btns.classList.remove('d-none');
                timer.classList.remove('d-none');
                resOverlay.style.display = 'none';

                if (currentQuestionIndex !== lastLoadedQuestion) {
                    lastLoadedQuestion = currentQuestionIndex;
                    canAnswer = true;
                    qUI.style.opacity = "1";
                    qUI.style.pointerEvents = "all";
                    document.getElementById('answerFeedback').innerText = "";
                }
                if (data.startTime) runTimerUI(data.startTime, data.duration || 20, 'timerBar');
                showPlayerRank(false); 
            } else {
                // Time is up or host stopped answers
                if (loadingOverlay) loadingOverlay.style.display = 'none';
                showResultOverlay(currentQuestionIndex);
            }
        } 
        else if (data.state === 'scoreboard' || data.state === 'final') {
            if (loadingOverlay) loadingOverlay.style.display = 'none';
            showScreen('questionScreen');
            resOverlay.style.display = 'none';
            showPlayerRank(true); // Big Center Display
        }
    }
});

    async function showResultOverlay(qIdx) {
        const resOverlay = document.getElementById('resultOverlay');
        const ansSnap = await get(ref(db, `quizGame/answers/q${qIdx}/${myPlayerKey}`));
        const myAns = ansSnap.val();
        const isCorrect = (myAns === questions[qIdx].correct);

        resOverlay.style.display = 'flex';
        resOverlay.className = `result-overlay ${isCorrect ? 'bg-correct' : 'bg-wrong'}`;
        document.getElementById('resultStatus').innerText = isCorrect ? "CORRECT" : (myAns === null ? "TIME'S UP" : "WRONG");
        document.getElementById('resultPoints').innerText = isCorrect ? "Fast and accurate!" : "Better luck next time!";
    }

    // --- UPDATED RANK DISPLAY ---
async function showPlayerRank(isBig) {
    const snap = await get(playersRef);
    const players = snap.val();
    if (!players || !myPlayerKey) return;
    
    const sorted = Object.keys(players).sort((a, b) => players[b].score - players[a].score);
    const rank = sorted.indexOf(myPlayerKey) + 1;
    const suffix = ["st","nd","rd"][((rank+90)%100-10)%10-1] || "th";
    const rankText = rank + suffix;

    if (isBig) {
        document.getElementById('playerQuestionUI').classList.add('d-none');
        const centerRank = document.getElementById('centerRankDisplay');
        centerRank.classList.add('active-screen');
        
        document.getElementById('centerRankNumber').innerText = rankText;
        document.getElementById('centerRankText').innerText = (rank === 1) ? "You're in 1st Place!" : "Nice effort!";
    } else {
        document.getElementById('playerRankDisplay').classList.remove('d-none');
        document.getElementById('rankNumber').innerText = rankText;
    }
}

// --- UPDATED PODIUM LOGIC WITH CONFETTI ---
function renderFinalPodium() {
    onValue(playersRef, (snapshot) => {
        const players = snapshot.val();
        if (!players) return;
        
        // Trigger Confetti
        const colors = ['#ff0000', '#000000', '#ffffff'];
        confetti({ particleCount: 500, spread: 90, angle: 45, startVelocity: 100, origin: { x: 0, y: 1 }, colors });
        confetti({ particleCount: 500, spread: 90, angle: 135, startVelocity: 80, origin: { x: 1, y: 1 }, colors });
        setTimeout(() => {
            confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 }, colors });
        }, 500);
        setTimeout(() => {
            confetti({ particleCount: 300, spread: 90, origin: { x: 0.3, y: 0.8}, colors });
            confetti({ particleCount: 300, spread: 90, origin: { x: 0.7, y: 0.8}, colors });
        }, 1000);

        const sorted = Object.values(players).sort((a, b) => b.score - a.score).slice(0, 3);
        const icons = ["🥇", "🥈", "🥉"];
        const html = sorted.map((p, i) => `
            <div class="mb-3 p-3 card">${icons[i]} ${p.name}: <span class="text-warning">${p.score}</span></div>
        `).join('');
        document.getElementById('finalWinnersList').innerHTML = html;
    }, { onlyOnce: true });
}

</script>
</body>
</html>
